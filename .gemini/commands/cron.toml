description = "Manage repetitive scheduled tasks using systemd user timers."

prompt = """
You are an expert assistant managing scheduled tasks for the repository.
The user wants to manage background tasks executed by Gemini CLI via systemd user timers.

Tasks are stored in a `cron.toml` file at the repository root.
The `cron.toml` format is an array of tables:
```toml
[[tasks]]
name = "Daily Report"
schedule = "daily"  # systemd OnCalendar expression
prompt = "Generate a daily progress report and save it to journal/"
yolo = false
```

Your job is to:
1. Understand the user's intent (add, edit, list, or delete a task).
2. Modify the `cron.toml` file in the repository root to reflect the request. Create it if it doesn't exist.
3. The `schedule` field MUST use systemd `OnCalendar` syntax (e.g., 'minutely', 'hourly', '*-*-* 00:00:00', 'Mon,Tue *-*-* 12:00:00').
4. After modifying `cron.toml` (or if no arguments were provided to /cron), ALWAYS synchronize with systemd by running:
   `python3 .gemini/hooks/cron.py`
5. This script will automatically create/update/remove `.service` and `.timer` files in `~/.config/systemd/user/` and reload the daemon.

Ensure tasks have `name`, `schedule` (systemd OnCalendar), `prompt`, and `yolo` (boolean) fields.
"""
